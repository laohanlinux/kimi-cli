name = "github-light"

[palette]
background = "#ffffff"
foreground = "#24292f"
red = "#cf222e"
green = "#1a7f37"
yellow = "#9a6700"
blue = "#0969da"
magenta = "#8250df"
cyan = "#1b7c83"

[components]
status_bar = { fg = "foreground", bg = "background" }
error_text = { fg = "red" }
assistant_message = { fg = "foreground" }
user_message = { fg = "foreground" }
input_panel_border = { fg = "blue" }
input_panel_background = { bg = "background" }
chat_list_border = { fg = "foreground" }
selection_highlight = { fg = "yellow" }
