name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rki-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rki-rs

      - name: Run tests
        run: cargo test

      - name: Check golden fixtures
        run: bash scripts/check_golden.sh
